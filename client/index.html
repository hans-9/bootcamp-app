<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootcamp App</title>
    <script>
      // Set the theme before first paint to avoid a light-mode flash. Reads the
      // preference cached by SettingsContext, falling back to the OS setting.
      (function () {
        try {
          var pref = localStorage.getItem('theme') || 'system'
          var dark =
            pref === 'dark' ||
            (pref === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light')
        } catch (e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
